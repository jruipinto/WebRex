<div
  class="flex justify-between items-center rounded border border-neutral-800 focus-within:border-neutral-500 text-neutral-300 bg-neutral-900/25 text-xs"
>
  <input
    class="border-0 w-full h-full px-2 py-1 focus:outline-0"
    [class.cursor-default]="readOnly()"
    [title]="title()"
    [placeholder]="placeholder()"
    [spellcheck]="false"
    [readOnly]="readOnly()"
    [formControl]="formControlRef()"
    [value]="value()"
    autocorrect="off"
    type="text"
    (input)="valueChange.emit($any($event.target).value)"
  />
</div>
