<label class="block font-medium text-neutral-400"> Logs </label>

<div class="h-[82dvh] mt-2">
  <div class="sticky top-0 left-0 bg-neutral-800">
    <app-search-input
      class="w-full"
      [title]="'Filter the presented logs conveniently'"
      [(value)]="$searchValue"
    ></app-search-input>
  </div>
  <div
    class="relative h-full text-sm rounded mt-2 shadow bg-neutral-950 text-neutral-400 font-mono"
  >
    <code #logsContainer class="block h-full overflow-y-auto p-4">
      @for (log of logs$ | async; track log.id) {
        <pre style="tab-size: 8" class="block mb-2 leading-none">{{
          log.value
        }}</pre>
      }
    </code>
    <div class="absolute top-0 right-0 me-4 mt-2">
      <ds-button
        [title]="'Delete all logs from the WebRex backend'"
        [$isLoading]="$isClearing()"
        (click)="clearLogs()"
        ><span class="material-symbol text-base me-1">cleaning_services</span> Clean</ds-button
      >
    </div>
  </div>
</div>
