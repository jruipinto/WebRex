<div class="flex gap-4 h-full max-[960px]:gap-10">
  <app-editor
    class="grow"
    [$title]="'Snippet:'"
    [value]="
      ((form.controls.codeTS.valueChanges | async) ??
        form.controls.codeTS.value) ||
      ''
    "
    (valueChange)="form.controls.codeTS.setValue($event)"
    (keydown)="save($event)"
  >
    <div
      slot="topcontrols"
      class="grow inline-flex gap-2 justify-between items-center ps-1"
    >
      <input
        [title]="
          'The name of the snippet, as a path, which allows to group snippets conveniently. i.e: \'/favorites/my-snippet.ts\''
        "
        class="grow mt-[2px] text-[12px] text-neutral-400 border-0 px-2 py-1 bg-(--monaco-editor-dark-bg-color)/50 rounded max-w-[40em]"
        placeholder="/path..."
        [spellcheck]="false"
        autocorrect="off"
        type="text"
        [formControl]="form.controls.context"
      />

      <div>
        <ds-button
          [title]="'Empty all editor content'"
          (click)="form.controls.codeTS.setValue('')"
          >🧹Clean</ds-button
        >
        <ds-button
          [title]="
            'Copy the content of the snippet compiled as JS, to clipboard'
          "
          [$isLoading]="$isCompilingJs()"
          (click)="compileToJSAndCopyToClipboard(form.controls.codeTS.value)"
          >📋 Copy JS</ds-button
        >
        <ds-button
          [title]="'Run snippet in the proxied app'"
          [$isLoading]="$isRunning()"
          (click)="
            run({
              value: { codeTS: form.controls.codeTS.value },
            })
          "
          >⚡Run</ds-button
        >
        <ds-button
          [title]="'Save snippet'"
          [$isLoading]="$isSaving()"
          (click)="save(null)"
          >💾 Save</ds-button
        >
      </div>
    </div>
  </app-editor>

  <app-snippet-list></app-snippet-list>
</div>
