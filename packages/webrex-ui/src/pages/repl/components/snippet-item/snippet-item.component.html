<div class="flex gap-4 justify-between items-center">
  @let name = nodeInput().name;
  <!-- TODO: remove this  class.text-red-300 atribute when old snippets gets totally removed-->
  <div
    [title]="name"
    [class.text-red-300]="!nodeInput().value.id"
    class="text-xs truncate"
  >
    {{ name }}
  </div>
  <div class="min-w-fit">
    <ds-button
      class="relative top-[1px]"
      [title]="'Run snippet in the proxied app'"
      [$variant]="'small'"
      [$isLoading]="$isRunning()"
      (click)="run(nodeInput().value)"
    >
      <span class="material-symbol me-1">bolt</span> Run
    </ds-button>
    <ds-menu
      [title]="'More options'"
      [$variant]="'small-fab'"
      [$label]="'⋮'"
      [showSpinner]="$isDeleting()"
    >
      <ds-menu-option
        [title]="'Open snippet in the editor'"
        value="view"
        (optionSelect)="open(nodeInput().value)"
      >
        <span class="material-symbol text-base me-1">visibility</span> View
      </ds-menu-option>
      <ds-menu-option
        [title]="'Duplicate snippet'"
        value="duplicate"
        (optionSelect)="duplicate(nodeInput().value)"
      >
        <span class="material-symbol text-base me-1">file_copy</span> Duplicate
      </ds-menu-option>
      <ds-menu-option
        [title]="'Delete snippet forever'"
        value="delete"
        (optionSelect)="delete(nodeInput().value)"
      >
        <span class="material-symbol text-base me-1">delete</span> Delete
      </ds-menu-option>
    </ds-menu>
  </div>
</div>
