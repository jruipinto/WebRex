<div class="flex gap-4 h-full max-[960px]:gap-10">
  <app-editor
    class="grow"
    [$title]="'Interceptor:'"
    [value]="
      ((form.controls.codeTS.valueChanges | async) ??
        form.controls.codeTS.value) ||
      ''
    "
    (valueChange)="form.controls.codeTS.setValue($event)"
    (keydown)="save($event)"
  >
    <div
      slot="topcontrols"
      class="grow inline-flex gap-2 justify-between items-center ps-1"
    >
      <input
        [title]="
          'Corresponds to the exact url.pathname to be intercepted, to allow to mutate that endpoint response. i.e: \'/api/v1/users\''
        "
        class="grow mt-[2px] text-[12px] text-neutral-400 border-0 px-2 py-1 bg-(--monaco-editor-dark-bg-color)/50 rounded max-w-[40em]"
        placeholder="/path..."
        [spellcheck]="false"
        autocorrect="off"
        type="text"
        [formControl]="form.controls.context"
      />

      <div>
        <label
          [title]="
            'Displays the interceptor hability to be executed in the proxy (enabled will be executed, disabled will not)'
          "
          class="inline-flex gap-1 justify-between items-center text-[12px] font-semibold text-neutral-500 cursor-pointer me-2"
        >
          Enabled:
          <div class="relative">
            {{ (form.controls.enabled.valueChanges | async) ? '✅' : '⬛' }}
            <input
              class="opacity-0 absolute top-0 left-0 w-full h-full"
              type="checkbox"
              [formControl]="form.controls.enabled"
            />
          </div>
        </label>
        <ds-button
          [title]="'Empty all editor content'"
          (click)="form.controls.codeTS.setValue('')"
          >🧹Clean</ds-button
        >
        <ds-button
          [title]="'Save interceptor'"
          (click)="save(null)"
          [$isLoading]="$isSaving()"
          >💾 Save</ds-button
        >
      </div>
    </div>
  </app-editor>

  <app-interceptor-list></app-interceptor-list>
</div>
