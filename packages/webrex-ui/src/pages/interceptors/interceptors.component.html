<div class="flex gap-4 h-full max-[960px]:gap-10">
  <app-editor
    class="grow"
    [$title]="'Interceptor'"
    [value]="
      ((form.controls.codeTS.valueChanges | async) ??
        form.controls.codeTS.value) ||
      ''
    "
    (valueChange)="form.controls.codeTS.setValue($event)"
    (keydown)="save($event)"
  >
    <div
      slot="topcontrols"
      class="grow inline-flex gap-2 justify-between items-center ps-1"
    >
      <app-path-input
        class="grow"
        [title]="
          'Corresponds to the exact url.pathname to be intercepted, to allow to mutate that endpoint response. i.e: \'/api/v1/users\''
        "
        [formControlRef]="form.controls.context"
      />

      <div>
        <label
          [title]="
            'Displays the interceptor hability to be executed in the proxy (enabled will be executed, disabled will not)'
          "
          class="relative -top-[2px] inline-flex gap-1 justify-between items-center text-[12px] text-neutral-400 cursor-pointer p-1"
        >
          Enabled:
          <span class="material-symbol text-base me-1">{{
            (form.controls.enabled.valueChanges | async)
              ? 'check_box'
              : 'check_box_outline_blank'
          }}</span>

          <input
            class="opacity-0 absolute size-0"
            type="checkbox"
            [formControl]="form.controls.enabled"
          />
        </label>
        <ds-button
          [title]="'Empty all editor content'"
          (click)="
            form.reset({
              codeTS: '',
            })
          "
          ><span class="material-symbol text-base me-1">cleaning_services</span
          >Clean</ds-button
        >
        <ds-button
          [title]="'Save interceptor'"
          (click)="save(null)"
          [$isLoading]="$isSaving()"
          ><span class="material-symbol text-base me-1">save</span>
          Save</ds-button
        >
      </div>
    </div>
  </app-editor>

  <app-interceptor-list></app-interceptor-list>
</div>
